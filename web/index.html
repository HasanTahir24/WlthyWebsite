<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="wlthy_website">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>wlthy_website</title>
  <link rel="manifest" href="manifest.json">

  <!-- Loading splash: shown instantly (self-contained, no network requests),
       removed on Flutter's first painted frame. Cream background matches the
       hero so there is no colour flash when the app takes over. -->
  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      background: #F5F5F3;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash img { width: 148px; max-width: 44vw; height: auto; }
    #splash .spinner {
      width: 26px;
      height: 26px;
      border: 2px solid rgba(165, 138, 106, 0.25);
      border-top-color: #A58A6A;
      border-radius: 50%;
      animation: splash-spin 0.8s linear infinite;
    }
    @keyframes splash-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      #splash .spinner { animation: none; }
    }
  </style>
</head>
<body>
  <div id="splash">
    <img src="wlthy_logo.png" alt="wlthy" />
    <div class="spinner"></div>
  </div>
  <script>
    (function () {
      function hideSplash() {
        var el = document.getElementById('splash');
        if (!el) return;
        el.classList.add('hide');
        setTimeout(function () { el.remove(); }, 500);
      }
      // Remove the splash the moment Flutter paints its first frame…
      window.addEventListener('flutter-first-frame', hideSplash);
      // …with a safety net so it can never get stuck if that event is missed.
      setTimeout(hideSplash, 15000);
    })();
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
    <script>
if (window.location.hostname === "wlthy-e9bce.firebaseapp.com") {
    window.location.replace("https://web.app" + window.location.pathname + window.location.search);
  }
</script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
